seed_everything: 7
trainer:
  checkpoint_callback: true
  callbacks:
    - class_path: pytorch_lightning.callbacks.LearningRateMonitor
      init_args:
        logging_interval: epoch
    - class_path: pytorch_lightning.callbacks.ModelCheckpoint
      init_args:
        save_top_k: 1
        monitor: val_ExpRate
        mode: max
        filename: '{epoch}-{step}-{val_ExpRate:.4f}'
  gpus: 1 #0,1  # PL 1.4: use cuda:0 and cuda:1
  accelerator: ddp
  # gpus: 1
  val_check_interval: 2500
  max_epochs: 30
  gradient_clip_val: 1.0
  deterministic: true
model:
  d_model: 256
  # encoder
  growth_rate: 24
  num_layers: 16
  # decoder
  nhead: 8
  num_decoder_layers: 3
  dim_feedforward: 1024
  dropout: 0.3
  dc: 32
  cross_coverage: true
  self_coverage: true
  # beam search
  beam_size: 10
  max_len: 50
  alpha: 1.0
  early_stopping: false
  temperature: 1.0
  # training
  learning_rate: 0.08
  patience: 20
  # fisher loss
  use_fisher_loss: false
  lambda_fisher: 0.1
  fisher_warmup_epoch: 2
  fisher_proj_dim: 128
  fisher_ignore_special_tokens: true
  learn_layer_weight: true
  # load CoMER weights only; Fisher head is randomly initialized
  pretrained_ckpt:
data:
  train_path: preprocessing/output/dataset/data/train
  val_path: preprocessing/output/dataset/data/val
  test_path: preprocessing/output/dataset/data/2023
  train_batch_size: 8
  eval_batch_size: 4
  num_workers: 5
  scale_aug: true
